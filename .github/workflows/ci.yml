name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the packageManager field in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Token build is the contrast gate: any WCAG AA failure in any theme throws
      - run: pnpm build

      # Hand-written prose must agree with the generated manifest
      - run: node tools/check-docs-drift.mjs

      - run: pnpm test

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm vr
        env: { CI: "true" }

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vr-baselines
          path: |
            apps/storybook/vr/stories.spec.ts-snapshots/
            test-results/

      - run: pnpm lint
