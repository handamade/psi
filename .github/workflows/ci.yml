name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the packageManager field in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Token build is the contrast gate: any WCAG AA failure in any theme throws
      - run: pnpm build

      # Hand-written prose must agree with the generated manifest
      - run: node tools/check-docs-drift.mjs

      - run: pnpm test

      - run: pnpm lint
